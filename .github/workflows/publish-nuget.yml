name: Publish NuGet package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and pack
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve package version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          raw_version="$RELEASE_TAG"
          version="${raw_version#v}"

          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Expected a SemVer version such as v0.2.0 or 0.2.0-preview.1; got '$raw_version'." >&2
            exit 1
          fi

          if [[ "$RELEASE_IS_PRERELEASE" == "true" && "$version" != *-* ]]; then
            echo "GitHub prereleases must use a prerelease version; got '$version'." >&2
            exit 1
          fi

          if [[ "$RELEASE_IS_PRERELEASE" != "true" && "$version" == *-* ]]; then
            echo "Stable GitHub releases must use a stable version; got '$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backoffice dependencies
        working-directory: src/TheBuilder.WebAnalytics/Client
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Restore
        run: dotnet restore TheBuilder.WebAnalytics.slnx

      - name: Test
        run: dotnet test TheBuilder.WebAnalytics.slnx --configuration Release --no-restore

      - name: Pack
        run: >-
          dotnet pack src/TheBuilder.WebAnalytics/TheBuilder.WebAnalytics.csproj
          --configuration Release
          --no-restore
          --output artifacts
          -p:Version=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheBuilder.WebAnalytics-${{ steps.version.outputs.version }}
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

  publish:
    name: Publish to nuget.org
    needs: build
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: TheBuilder.WebAnalytics-${{ needs.build.outputs.version }}
          path: artifacts

      - name: Exchange OIDC token for production API key
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish package to nuget.org
        run: >-
          dotnet nuget push artifacts/*.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
